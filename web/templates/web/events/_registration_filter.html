<div class="card shadow-sm mb-4">
    <div class="card-body p-3">
        <form method="get" class="row g-2 align-items-end">
            {% for field in filter.form %}
            <div class="col-auto">
                <label class="form-label small fw-medium mb-1">{{ field.label }}</label>
                {{ field }}
            </div>
            {% endfor %}
            <div class="col-auto d-flex gap-2">
                <button type="submit" class="btn btn-primary btn-sm rounded-pill">Filter</button>
                <a href="{{ filter_clear_url }}" class="btn btn-outline-secondary btn-sm rounded-pill">Clear</a>
            </div>
        </form>
    </div>
</div>
