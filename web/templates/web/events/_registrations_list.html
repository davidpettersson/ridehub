{% load django_tables2 %}

{% if all_riders %}
<h2 class="eyebrow mb-2">Registered riders ({{ filtered_riders|length }})</h2>

{% include 'web/events/_registration_filter.html' %}

    <div class="card shadow-sm registrations-table-card">
        <div class="p-4">
            <div class="overflow-auto">
                {% render_table table %}
            </div>
        </div>
    </div>
{% else %}
<h2 class="eyebrow mb-2">Registered riders (0)</h2>
<div class="py-5 text-center card">
    <p class="text-muted">No riders found for this event.</p>
</div>
{% endif %}
