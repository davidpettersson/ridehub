{% extends 'web/_base_bootstrap.html' %}
{% block title %}Email Verified{% endblock %}
{% block content %}
    <div class="row justify-content-center py-5">
        <div class="col-12 col-sm-8 col-md-6 col-lg-5">
            <div class="card">
                <div class="card-body p-4 text-center">
                    <div class="d-inline-flex align-items-center justify-content-center rounded-circle bg-success bg-opacity-10 mb-4" style="width: 64px; height: 64px;">
                        <i class="bi bi-check-lg text-success fs-2"></i>
                    </div>

                    <h1 class="fs-4 fw-bold mb-3">Email Verified</h1>

                    <p class="text-secondary mb-3">
                        Your email has been verified and you are confirmed for <strong>{{ registration.event.name }}</strong>. A confirmation email is on its way.
                    </p>

                    <div class="mt-4 d-flex flex-column flex-sm-row gap-2 justify-content-center">
                        <a href="{% url 'profile' %}" class="btn btn-primary">
                            View profile
                        </a>
                        <a href="{% url 'events' %}" class="btn btn-primary">
                            View event list
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
{% endblock %}
