{% for announcement in announcements %}
<div class="alert {% if announcement.type == 'w' %}alert-warning{% else %}alert-info{% endif %} border-start border-4 d-flex align-items-start" role="alert">
  <div class="w-100">
    <h4 class="alert-heading fs-6 fw-semibold mb-1">{{ announcement.title }}</h4>
    <div class="prose-content small">{{ announcement.text|safe }}</div>
  </div>
</div>
{% endfor %}
